<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EKO-ECO · WALLBOXai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
    --bg:      #060809;
    --s1:      #0c1014;
    --s2:      #121820;
    --border:  #1a2535;
    --border2: #243040;
    --solar:   #f5c842;
    --solar2:  #e8a800;
    --grid:    #41c9f0;
    --grid2:   #0da8d4;
    --green:   #3dd68c;
    --red:     #f06060;
    --text:    #dce8f0;
    --muted:   #4a6070;
    --muted2:  #7a9ab0;
    --r:       10px;
    --mono:    'IBM Plex Mono', monospace;
    --sans:    'IBM Plex Sans', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
}

/* scanline overlay */
body::before {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.03) 2px, rgba(0,0,0,.03) 4px);
    pointer-events:none;
    z-index:1000;
}

/* ── HEADER ── */
.hdr {
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
}
.logo {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
}
.logo .e1 { color: var(--solar); }
.logo .sep { color: var(--muted); margin: 0 4px; }
.logo .e2 { color: var(--grid); }
.logo .sub { font-size: 10px; color: var(--muted2); letter-spacing: 2px; display: block; margin-top: 2px; font-weight: 400; }

.hdr-right {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted2);
    text-align: right;
    line-height: 1.6;
}
.hdr-right .ref { color: var(--text); }

/* ── TOTALS BAR ── */
.totals {
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    align-items: center;
}
.tot-item {
    font-family: var(--mono);
    font-size: 12px;
}
.tot-item .lbl { color: var(--muted2); font-size: 10px; display: block; letter-spacing: 1px; margin-bottom: 3px; }
.tot-item .val { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.tot-item.s .val { color: var(--solar); }
.tot-item.g .val { color: var(--grid); }
.tot-item.t .val { color: var(--text); }
.tot-item.m .val { color: var(--green); }
.tot-divider { width: 1px; height: 40px; background: var(--border); }

/* ── TABS ── */
.tabs-wrap {
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
}
.tabs-wrap::-webkit-scrollbar { display: none; }

.tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
    padding: 14px 18px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .15s;
    white-space: nowrap;
    text-transform: uppercase;
}
.tab:hover { color: var(--text); }
.tab.on { color: var(--solar); border-bottom-color: var(--solar); }
.tab.rok-tab { color: var(--muted2); }
.tab.rok-tab.on { color: var(--green); border-bottom-color: var(--green); }

/* ── CONTENT ── */
.content {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 28px 60px;
}

/* ── MONTH HEADER ── */
.month-hdr {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.month-hdr .m-name { color: var(--text); font-size: 13px; font-weight: 600; }

/* ── DAY ROW ── */
.day-block {
    margin-bottom: 6px;
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    transition: border-color .15s;
}
.day-block:hover { border-color: var(--border2); }
.day-block.today { border-color: var(--solar); }
.day-block.today .day-date { color: var(--solar); }

.day-date-row {
    background: var(--s1);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
}
.day-date {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted2);
    min-width: 55px;
}
.day-dow {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
}
.day-total {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted2);
}
.day-total strong { color: var(--text); }

.day-lines {
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.day-line {
    font-family: var(--mono);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}
.dl-ico { font-size: 13px; min-width: 18px; }
.dl-kwh { min-width: 80px; }
.dl-kwh.s { color: var(--solar); }
.dl-kwh.g { color: var(--grid); }
.dl-kwh.t { color: var(--text); font-weight: 600; }
.dl-km { color: var(--muted2); min-width: 60px; }
.dl-pct {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
}
.dl-pct.s { background: rgba(245,200,66,.12); color: var(--solar); }
.dl-pct.g { background: rgba(65,201,240,.12); color: var(--grid); }
.dl-cena { color: var(--muted2); }
.dl-usp { color: var(--green); margin-left: auto; font-size: 11px; }
.dl-usp::before { content: '↑ '; }

/* ── MONTH SUMMARY ── */
.month-sum {
    margin: 16px 0 32px;
    background: var(--s1);
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 14px 16px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
}
.ms-item { font-family: var(--mono); }
.ms-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 3px; }
.ms-val { font-size: 16px; font-weight: 600; }
.ms-val.s { color: var(--solar); }
.ms-val.g { color: var(--grid); }
.ms-val.t { color: var(--text); }
.ms-val.m { color: var(--green); }

/* ── YEAR VIEW ── */
.year-month-block { margin-bottom: 28px; }
.ym-hdr {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted2);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
}
.ym-hdr .ym-name { color: var(--text); }
.ym-row {
    font-family: var(--mono);
    font-size: 12px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--s1);
}
.ym-cell { }
.ym-cell .lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.ym-cell .val { font-size: 14px; font-weight: 600; }
.ym-cell.s .val { color: var(--solar); }
.ym-cell.g .val { color: var(--grid); }
.ym-cell.t .val { color: var(--text); }
.ym-cell.m .val { color: var(--green); }
.ym-cell.k .val { color: var(--muted2); }

/* Year totals */
.year-totals {
    background: linear-gradient(135deg, rgba(245,200,66,.05), rgba(65,201,240,.05));
    border: 1px solid var(--border2);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 28px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
}
.yt-item { font-family: var(--mono); }
.yt-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
.yt-val { font-size: 24px; font-weight: 600; letter-spacing: -1px; }
.yt-val.s { color: var(--solar); }
.yt-val.g { color: var(--grid); }
.yt-val.t { color: var(--text); }
.yt-val.m { color: var(--green); }
.yt-sub { font-size: 10px; color: var(--muted2); margin-top: 3px; }

.loading { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 40px 0; text-align: center; animation: blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }
.empty { font-family: var(--mono); font-size: 12px; color: var(--muted); padding: 60px 0; text-align: center; }

@media(max-width:600px){
    .hdr{padding:16px}.content{padding:16px 16px 60px}
    .totals{padding:12px 16px;gap:16px}
    .tabs-wrap{padding:0 16px}
    .ym-row{grid-template-columns:1fr 1fr 1fr}
    .year-totals{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="hdr">
    <div>
        <div class="logo">
            <span class="e1">EKO</span><span class="sep">·</span><span class="e2">ECO</span>
            <span class="sub">ŠTATISTIKY NABÍJANIA · KIA eNIRO 64 kWh</span>
        </div>
    </div>
    <div class="hdr-right">
        <span>📐 16.8 kWh/100km</span><br>
        <span>🚗 Ref: <span class="ref">Škoda Yeti 4×4 · 7L · 1.514 €/l</span></span><br>
        <span>GoodWe FV · Wallbox AI · OCPP</span>
    </div>
</div>

<div class="totals" id="totals-bar">
    <div class="loading">Načítavam...</div>
</div>

<div class="tabs-wrap" id="tabs-wrap"></div>

<div class="content" id="content">
    <div class="loading">Načítavam dáta...</div>
</div>

<script>
const SUPABASE_URL = 'https://pblklfocouytlicbljfx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBibGtsZm9jb3V5dGxpY2JsamZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2ODc2MjksImV4cCI6MjA5NDI2MzYyOX0.cHEd9YfQscR0955snqh-uwv2p2d_u8IX0VQ1F9htqE0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Konštanty
const KWH_PER_100KM = 16.8;
const YETI_L_PER_100KM = 7.0;
const YETI_PRICE_PER_L = 1.514;

const MONTHS_SK = ['Január','Február','Marec','Apríl','Máj','Jún','Júl','August','September','Október','November','December'];
const DOW_SK = ['Ne','Po','Ut','St','Št','Pi','So'];

let allData = [];
let activeTab = null;

function f2(n) { return Number(n||0).toFixed(2); }
function f1(n) { return Number(n||0).toFixed(1); }
function fi(n) { return Math.round(Number(n||0)); }

function yetiSavings(km, ev_cost) {
    const yeti_cost = km / 100 * YETI_L_PER_100KM * YETI_PRICE_PER_L;
    return yeti_cost - ev_cost;
}

async function loadAll() {
    const { data, error } = await sb
        .from('nabijanie')
        .select('*')
        .order('datum', { ascending: true });
    if (error) { console.error(error); return; }
    allData = data || [];
    buildUI();
}

function buildUI() {
    if (allData.length === 0) {
        document.getElementById('totals-bar').innerHTML = '<div class="empty">Žiadne dáta</div>';
        document.getElementById('content').innerHTML = '<div class="empty">Home Assistant ešte neodoslal záznamy.</div>';
        return;
    }

    // Celkové súčty
    let ts=0,tso=0,tg=0,tk=0,tc=0;
    for (const r of allData) { ts+=+r.spolu_kwh; tso+=+r.solar_kwh; tg+=+r.siet_kwh; tk+=+r.spolu_km; tc+=+r.cena_eur; }
    const t_usp = yetiSavings(tk, tc);
    const sol_pct = ts > 0 ? Math.round(tso/ts*100) : 0;

    document.getElementById('totals-bar').innerHTML = `
        <div class="tot-item t"><span class="lbl">SPOLU kWh</span><span class="val">⚡ ${f2(ts)}</span></div>
        <div class="tot-divider"></div>
        <div class="tot-item s"><span class="lbl">SOLÁR (${sol_pct}%)</span><span class="val">☀️ ${f2(tso)}</span></div>
        <div class="tot-divider"></div>
        <div class="tot-item g"><span class="lbl">SIEŤ</span><span class="val">🔌 ${f2(tg)}</span></div>
        <div class="tot-divider"></div>
        <div class="tot-item t"><span class="lbl">km celkom</span><span class="val">🛣️ ${fi(tk)}</span></div>
        <div class="tot-divider"></div>
        <div class="tot-item m"><span class="lbl">ušetrené vs Yeti</span><span class="val">💚 ${f2(t_usp)} €</span></div>
    `;

    // Zistiť dostupné mesiace + roky
    const months = {}; // "2026-05" -> [rows]
    const years = {};  // "2026" -> [rows]
    for (const r of allData) {
        const ym = r.datum.slice(0,7);
        const y  = r.datum.slice(0,4);
        if (!months[ym]) months[ym] = [];
        if (!years[y])   years[y]  = [];
        months[ym].push(r);
        years[y].push(r);
    }

    // Zoradiť od najnovšieho mesiaca
    const sortedMonths = Object.keys(months).sort().reverse();
    const sortedYears  = Object.keys(years).sort().reverse();

    // Tabuľka tabs
    const tabsWrap = document.getElementById('tabs-wrap');
    tabsWrap.innerHTML = '';

    sortedMonths.forEach(ym => {
        const [y, m] = ym.split('-');
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.textContent = MONTHS_SK[+m-1] + ' ' + y;
        btn.dataset.tab = ym;
        btn.onclick = () => showTab(ym, months, years);
        tabsWrap.appendChild(btn);
    });

    // Rok tab
    sortedYears.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'tab rok-tab';
        btn.textContent = '📊 ' + y;
        btn.dataset.tab = 'rok-' + y;
        btn.onclick = () => showYearTab(y, years[y], months);
        tabsWrap.appendChild(btn);
    });

    // Zobraziť prvý (najnovší) mesiac
    if (sortedMonths.length > 0) {
        showTab(sortedMonths[0], months, years);
    }
}

function showTab(ym, months, years) {
    activeTab = ym;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelector(`[data-tab="${ym}"]`)?.classList.add('on');

    const rows = months[ym];
    const [y, m] = ym.split('-');
    const monthName = MONTHS_SK[+m-1] + ' ' + y;

    // Súčty mesiaca
    let ms=0,mso=0,mg=0,mk=0,mc=0;
    for (const r of rows) { ms+=+r.spolu_kwh; mso+=+r.solar_kwh; mg+=+r.siet_kwh; mk+=+r.spolu_km; mc+=+r.cena_eur; }
    const m_usp = yetiSavings(mk, mc);
    const m_sol_pct = ms > 0 ? Math.round(mso/ms*100) : 0;

    const today = new Date().toISOString().slice(0,10);

    // Denné riadky — od najstaršieho
    const dayRows = rows.map(r => {
        const s = +r.solar_kwh, g = +r.siet_kwh, tot = +r.spolu_kwh;
        const s_km = +r.solar_km, g_km = +r.siet_km, t_km = +r.spolu_km;
        const cena = +r.cena_eur;
        const s_pct = tot > 0 ? Math.round(s/tot*100) : 0;
        const g_pct = 100 - s_pct;
        const usp = yetiSavings(t_km, cena);
        const d = new Date(r.datum);
        const dayNum = r.datum.slice(8,10) + '.' + r.datum.slice(5,7) + '.';
        const dow = DOW_SK[d.getDay()];
        const isToday = r.datum === today;

        return `<div class="day-block${isToday?' today':''}">
            <div class="day-date-row">
                <span class="day-date">${dayNum}</span>
                <span class="day-dow">${dow}</span>
                <span class="day-total">⚡ <strong>${f2(tot)} kWh</strong> · <strong>${fi(t_km)} km</strong></span>
            </div>
            <div class="day-lines">
                <div class="day-line">
                    <span class="dl-ico">☀️</span>
                    <span class="dl-kwh s">${f2(s)} kWh</span>
                    <span class="dl-km">${fi(s_km)} km</span>
                    <span class="dl-pct s">${s_pct}%</span>
                </div>
                <div class="day-line">
                    <span class="dl-ico">🔌</span>
                    <span class="dl-kwh g">${f2(g)} kWh</span>
                    <span class="dl-km">${fi(g_km)} km</span>
                    <span class="dl-pct g">${g_pct}%</span>
                    <span class="dl-cena">${f2(cena)} €</span>
                    <span class="dl-usp">${f2(usp)} € vs Yeti</span>
                </div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        <div class="month-hdr">
            <span class="m-name">${monthName}</span>
            <span>${rows.length} dní</span>
        </div>
        ${dayRows}
        <div class="month-sum">
            <div class="ms-item"><div class="ms-lbl">☀️ Solár</div><div class="ms-val s">${f2(mso)} kWh · ${fi(mso/KWH_PER_100KM*100)} km · ${m_sol_pct}%</div></div>
            <div class="ms-item"><div class="ms-lbl">🔌 Sieť</div><div class="ms-val g">${f2(mg)} kWh · ${fi(mg/KWH_PER_100KM*100)} km · ${f2(mc)} €</div></div>
            <div class="ms-item"><div class="ms-lbl">⚡ Spolu</div><div class="ms-val t">${f2(ms)} kWh · ${fi(mk)} km</div></div>
            <div class="ms-item"><div class="ms-lbl">💚 Ušetrené vs Yeti</div><div class="ms-val m">${f2(m_usp)} €</div></div>
        </div>
    `;
}

function showYearTab(y, rows, months) {
    activeTab = 'rok-' + y;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelector(`[data-tab="rok-${y}"]`)?.classList.add('on');

    // Ročné súčty
    let ys=0,yso=0,yg=0,yk=0,yc=0;
    for (const r of rows) { ys+=+r.spolu_kwh; yso+=+r.solar_kwh; yg+=+r.siet_kwh; yk+=+r.spolu_km; yc+=+r.cena_eur; }
    const y_usp = yetiSavings(yk, yc);
    const y_sol_pct = ys > 0 ? Math.round(yso/ys*100) : 0;

    // Mesačné súčty
    const monthKeys = Object.keys(months).filter(k => k.startsWith(y)).sort().reverse();
    const monthBlocks = monthKeys.map(ym => {
        const mr = months[ym];
        let ms=0,mso=0,mg=0,mk=0,mc=0;
        for (const r of mr) { ms+=+r.spolu_kwh; mso+=+r.solar_kwh; mg+=+r.siet_kwh; mk+=+r.spolu_km; mc+=+r.cena_eur; }
        const m_usp = yetiSavings(mk, mc);
        const m_sol_pct = ms > 0 ? Math.round(mso/ms*100) : 0;
        const mName = MONTHS_SK[+ym.slice(5,7)-1];
        return `<div class="year-month-block">
            <div class="ym-hdr"><span class="ym-name">${mName}</span><span>${mr.length} dní</span></div>
            <div class="ym-row">
                <div class="ym-cell s"><div class="lbl">☀️ Solar</div><div class="val">${f2(mso)} kWh</div><div style="font-size:10px;color:var(--muted2)">${m_sol_pct}%</div></div>
                <div class="ym-cell g"><div class="lbl">🔌 Sieť</div><div class="val">${f2(mg)} kWh</div><div style="font-size:10px;color:var(--muted2)">${f2(mc)} €</div></div>
                <div class="ym-cell t"><div class="lbl">⚡ Spolu</div><div class="val">${f2(ms)} kWh</div></div>
                <div class="ym-cell k"><div class="lbl">🛣️ km</div><div class="val">${fi(mk)}</div></div>
                <div class="ym-cell m"><div class="lbl">💚 vs Yeti</div><div class="val">${f2(m_usp)} €</div></div>
            </div>
        </div>`;
    }).join('');

    document.getElementById('content').innerHTML = `
        <div class="year-totals">
            <div class="yt-item"><div class="yt-lbl">⚡ Spolu kWh</div><div class="yt-val t">${f2(ys)}</div><div class="yt-sub">${y}</div></div>
            <div class="yt-item"><div class="yt-lbl">☀️ Solár (${y_sol_pct}%)</div><div class="yt-val s">${f2(yso)} kWh</div><div class="yt-sub">${fi(yso/KWH_PER_100KM*100)} km zadarmo</div></div>
            <div class="yt-item"><div class="yt-lbl">🔌 Sieť</div><div class="yt-val g">${f2(yg)} kWh</div><div class="yt-sub">${f2(yc)} € náklady</div></div>
            <div class="yt-item"><div class="yt-lbl">🛣️ km celkom</div><div class="yt-val t">${fi(yk)}</div><div class="yt-sub">16.8 kWh/100km</div></div>
            <div class="yt-item"><div class="yt-lbl">💚 ušetrené vs Yeti</div><div class="yt-val m">${f2(y_usp)} €</div><div class="yt-sub">Škoda Yeti 7L · 1.514€/l</div></div>
        </div>
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px">Mesačný prehľad ${y}</div>
        ${monthBlocks}
    `;
}

loadAll();
</script>
</body>
</html>
